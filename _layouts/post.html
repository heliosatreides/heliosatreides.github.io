---
layout: default
---

<article>
  <div class="post-header">
    {% if page.categories.size > 0 %}
    <span class="post-category">{{ page.categories | first }}</span>
    {% endif %}
    <h1>{{ page.title }}</h1>
    <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
